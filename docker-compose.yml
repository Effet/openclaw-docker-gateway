services:
  openclaw:
    build: .
    container_name: openclaw-gateway
    hostname: ${GATEWAY_HOSTNAME:-openclaw-gateway}
    restart: unless-stopped
    entrypoint: ["/entrypoint.sh"]
    command: ["supervisord", "-c", "/supervisord.conf"]
    env_file:
      - path: .env
        required: false
    volumes:
      - ./openclaw-config:/home/node/.openclaw          # config & state (isolated from host)
      - ./openclaw-workspace:/home/node/.openclaw/workspace  # agent workspace
      - ./toolchain:/home/node/.npm-global               # persisted npm global prefix (PROT-003)
      - ./launcher.sh:/launcher.sh:ro
      - ./supervisord.conf:/supervisord.conf:ro
      - ./openclaw-workspaces:/home/node/workspaces
      - ./openclaw-repos:/home/node/repos
    ports:
      - "127.0.0.1:18789:18789"
      - "18791:18791"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('net').createConnection(18789,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
      start_period: 120s
      interval: 10s
      timeout: 5s
      retries: 6


services:
  tailscale:
    image: tailscale/tailscale
    container_name: openclaw-tailscale
    hostname: ${GATEWAY_HOSTNAME:-openclaw-gateway}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - TS_USERSPACE=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_HOSTNAME=${GATEWAY_HOSTNAME:-openclaw-gateway}
      - TS_EXTRA_ARGS=--advertise-tags=${TS_TAG:-tag:server}
    volumes:
      - ./tailscale-state:/var/lib/tailscale
      - ./ts-serve.json:/config/serve.json:ro

  openclaw:
    network_mode: service:tailscale
    hostname: !reset null
    ports: !reset []

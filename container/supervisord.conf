[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon=true
user=node
pidfile=/tmp/supervisord.pid
logfile=/dev/stdout
logfile_maxbytes=0

[program:openclaw]
command=/bin/sh /launcher.sh gateway --allow-unconfigured
user=node
environment=HOME="/home/node",NPM_CONFIG_PREFIX="/home/node/.npm-global",PATH="/home/node/.npm-global/bin:/usr/local/bin:/usr/bin:/bin"
autostart=true
autorestart=true
startretries=5
stopasgroup=true
killasgroup=true
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:autosync]
command=/bin/sh /home/node/scripts/autosync.sh
user=node
environment=HOME="/home/node",NPM_CONFIG_PREFIX="/home/node/.npm-global",PATH="/home/node/.npm-global/bin:/usr/local/bin:/usr/bin:/bin"
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
